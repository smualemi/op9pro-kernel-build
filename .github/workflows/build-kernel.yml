name: Build OnePlus 9 Pro OOS14 Kernel (Forensic Protocol)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize Runner Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - name: Install Legacy Build Dependencies & libncurses5
        run: |
          sudo apt-get update
          # libncurses5 is strictly required for Clang 11.0.2 / lld execution on Ubuntu 22.04
          sudo apt-get install -y build-essential bc zip libssl-dev libfl-dev curl libncurses5

      - name: Clone Source and Precise Toolchains
        run: |
          mkdir -p ${{ github.workspace }}/workspace && cd ${{ github.workspace }}/workspace

          # Clone Kernel Source
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8350.git kernel
          
          # Clone AOSP Clang 11.0.2 (r383902b1)
          git clone --depth=1 -b clang-r383902b1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-toolchain

          # Dependency Resolution: Clone LineageOS GCC wrappers (fixes empty AOSP GCC repo bug)
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc-arm64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc-arm32

          # Clone AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 kernel-zip

      - name: Apply KMI & Vermagic Hacks (Commit 4c448df)
        run: |
          cd ${{ github.workspace }}/workspace/kernel
          
          # Hack: Spoof localversion to "-qgki" inside kernel/sys.c to ensure Wi-Fi modules load perfectly
          sed -i 's/UTS_RELEASE/UTS_RELEASE "-qgki"/g' kernel/sys.c
          
          # Hack: Disable KMI strict mode to allow custom kernel compilations without CRC panic
          sed -i 's/CONFIG_KMI_SYMBOL_LIST_STRICT_MODE=y/# CONFIG_KMI_SYMBOL_LIST_STRICT_MODE is not set/g' arch/arm64/configs/vendor/lahaina-qgki_defconfig

      - name: Compile Kernel Image
        run: |
          cd ${{ github.workspace }}/workspace/kernel
          
          export PATH="${{ github.workspace }}/workspace/clang-toolchain/bin:${{ github.workspace }}/workspace/gcc-arm64/bin:${{ github.workspace }}/workspace/gcc-arm32/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export LLVM=1
          export LLD=1

          # Apply Lahaina GKI Defconfig
          make O=out ARCH=arm64 CC=clang LLVM=1 LLD=1 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- vendor/lahaina-qgki_defconfig

          # Build Kernel Image
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLD=1 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- Image
          
      - name: Repack via AnyKernel3
        run: |
          cd ${{ github.workspace }}/workspace/kernel-zip
          cp ../kernel/out/arch/arm64/boot/Image .
          sed -i 's/device.name1=.*/device.name1=lemonadep/' anykernel.sh
          rm -rf patch ramdisk
          zip -r9 ../lemonadep-stock-kernel-A14.zip * -x .git README.md *placeholder

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonadep-stock-kernel-A14
          path: ${{ github.workspace }}/workspace/lemonadep-stock-kernel-A14.zip