name: Build OnePlus 9 Pro Stock-Equivalent Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEFCONFIG: ossi_oos14_defconfig
  DEVICE_CODENAME: lemonadep
  KERNEL_IMAGE: Image

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT SOURCES
      # ─────────────────────────────────────────────
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel/msm-5.4
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium

      # ─────────────────────────────────────────────
      # 2. INSTALL HOST DEPENDENCIES
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            git gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev libelf-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            cpio dos2unix rsync

      # ─────────────────────────────────────────────
      # 3. TOOLCHAIN — AOSP Clang 11 (r383902b1)
      # ─────────────────────────────────────────────
      - name: Clone AOSP Clang 11 from official android11-release
        run: |
          echo "==> Cloning official AOSP Clang 11.0.2 from android11-release branch..."
          rm -rf $GITHUB_WORKSPACE/toolchain/clang
          git clone \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            -b android11-release --depth=1 \
            $GITHUB_WORKSPACE/toolchain/clang
          # Verify the clang binary
          $GITHUB_WORKSPACE/toolchain/clang/clang-r383902b/bin/clang --version

      - name: Clone GCC aarch64 cross-compiler from LineageOS mirror
        run: |
          echo "==> Cloning GCC 4.9 aarch64 cross-compiler..."
          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-aarch64

      - name: Clone GCC arm32 cross-compiler (for compat vDSO)
        run: |
          echo "==> Cloning GCC 4.9 arm32 cross-compiler..."
          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-arm32

      - name: Clone AOSP Build Scripts
        run: |
          echo "==> Cloning AOSP build scripts (build.sh provider)..."
          git clone https://android.googlesource.com/kernel/build --depth=1 $GITHUB_WORKSPACE/build

      # ─────────────────────────────────────────────
      # 4. EMULATE AOSP DIRECTORY STRUCTURE
      # ─────────────────────────────────────────────
      - name: Construct Native AOSP Workspace Structure
        run: |
          echo "==> Syncing native AOSP structure from Device Tree (covers device, vendor, techpack)..."
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/ $GITHUB_WORKSPACE/
          
          echo "==> Merging out-of-tree Oplus Kernel Modifications..."
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/vendor/oplus/kernel/ $GITHUB_WORKSPACE/kernel/msm-5.4/
          
          # Clean up devicetree repo to save space
          rm -rf $GITHUB_WORKSPACE/kernel_modules_devicetree

          # Provide the common config that early wrappers explicitly expect
          ln -sfn $GITHUB_WORKSPACE/device/qcom/kernelscripts/upstream/build.config.common \
            $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.common

      # ─────────────────────────────────────────────
      # 5. PREPARE DEFCONFIG
      # ─────────────────────────────────────────────
      - name: Place stock defconfig
        run: |
          cp $GITHUB_WORKSPACE/defconfig/${{ env.DEFCONFIG }} \
             $GITHUB_WORKSPACE/kernel/msm-5.4/arch/arm64/configs/${{ env.DEFCONFIG }}
          echo "==> Defconfig placed at arch/arm64/configs/${{ env.DEFCONFIG }}"

      # ─────────────────────────────────────────────
      # 6. BUILD WITH WRAPPER SCRIPT
      # ─────────────────────────────────────────────
      - name: Generate Proxy Config & Build
        run: |
          # Build strictly from workspace root
          cd $GITHUB_WORKSPACE

          # ── Toolchain paths ──
          CLANG_DIR="$GITHUB_WORKSPACE/toolchain/clang/clang-r383902b"
          GCC64_DIR="$GITHUB_WORKSPACE/toolchain/gcc-aarch64"
          GCC32_DIR="$GITHUB_WORKSPACE/toolchain/gcc-arm32"

          export PATH="$CLANG_DIR/bin:$GCC64_DIR/bin:$GCC32_DIR/bin:$PATH"

          # Create Proxy Config
          cat << 'EOF' > build.config.custom
          function append_cmd() {
              if [ ! -z "${!1}" ]; then
                  eval "$1=\"${!1} && \$2\""
              else
                  eval "$1=\"\$2\""
              fi
          }
          export -f append_cmd
          
          # Source from the true location
          . ${ROOT_DIR}/kernel/msm-5.4/build.config.msm.lahaina
          
          DEFCONFIG=ossi_oos14_defconfig
          PRE_DEFCONFIG_CMDS=""
          LOCALVERSION="-qgki"
          EOF

          # Prevent script failures if they explicitly look for _setup_env in legacy paths
          mkdir -p $GITHUB_WORKSPACE/device/qcom/build
          cp $GITHUB_WORKSPACE/device/qcom/kernelscripts/_setup_env.sh $GITHUB_WORKSPACE/device/qcom/build/_setup_env.sh || true

          export BUILD_CONFIG=build.config.custom
          export KERNEL_DIR=kernel/msm-5.4
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          echo "============================================"
          echo "  Executing Official QCOM Build Wrapper"
          echo "============================================"
          bash device/qcom/kernelscripts/build.sh LLVM=1 LLVM_IAS=1

      # ─────────────────────────────────────────────
      # 7. ANYKERNEL3 PACKAGING
      # ─────────────────────────────────────────────
      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3

      - name: Package kernel into flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3

          # Remove example files
          rm -rf modules patch ramdisk
          rm -f README.md

          # Copy our device-specific anykernel.sh
          cp $GITHUB_WORKSPACE/anykernel/anykernel.sh ./anykernel.sh

          # Find the compiled kernel image dynamically
          echo "==> Searching for compiled kernel image..."
          KERNEL_BIN=$(find $GITHUB_WORKSPACE/out/ -name "Image" -type f | head -n 1)

          if [ -z "$KERNEL_BIN" ]; then
            echo "ERROR: Kernel image not found in out/ directory!"
            exit 1
          fi

          echo "==> Found Kernel Image: $KERNEL_BIN"
          # Copy the compiled kernel image
          cp "$KERNEL_BIN" ./${{ env.KERNEL_IMAGE }}

          # Create the flashable ZIP
          DATESTAMP=$(date +%Y%m%d-%H%M)
          ZIP_NAME="StockEquiv-OP9Pro-${DATESTAMP}.zip"
          zip -r9 "$GITHUB_WORKSPACE/${ZIP_NAME}" \
            . \
            -x '.git/*' \
            -x '*.zip'

          echo "==> Created: ${ZIP_NAME}"
          ls -lh "$GITHUB_WORKSPACE/${ZIP_NAME}"

      # ─────────────────────────────────────────────
      # 8. UPLOAD ARTIFACT
      # ─────────────────────────────────────────────
      - name: Upload kernel ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockEquiv-OP9Pro-kernel
          path: StockEquiv-OP9Pro-*.zip
          retention-days: 30
          if-no-files-found: error