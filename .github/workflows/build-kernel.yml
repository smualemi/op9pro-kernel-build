name: Build OnePlus 9 Pro Stock-Equivalent Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEFCONFIG: ossi_oos14_defconfig
  DEVICE_CODENAME: lemonadep
  KERNEL_IMAGE: Image

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ─────────────────────────────────────────────
      # 0. FREE DISK SPACE
      # ─────────────────────────────────────────────
      - name: Maximize disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # ─────────────────────────────────────────────
      # 0b. ADD SWAP
      # ─────────────────────────────────────────────
      - name: Create swap file
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /mnt/swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "==> Memory:"; free -h
          echo "==> Disk:"; df -h /

      # ─────────────────────────────────────────────
      # 1. CHECKOUT SOURCES
      # ─────────────────────────────────────────────
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel_source
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      - name: Clean up git metadata
        run: |
          rm -rf $GITHUB_WORKSPACE/kernel_source/.git
          rm -rf $GITHUB_WORKSPACE/kernel_modules_devicetree/.git

      # ─────────────────────────────────────────────
      # 2. INSTALL HOST DEPENDENCIES
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex \
            git gnupg gperf lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev libelf-dev \
            liblz4-tool libncurses5-dev \
            libssl-dev libxml2 libxml2-utils lzop \
            rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            cpio

      # ─────────────────────────────────────────────
      # 3. TOOLCHAINS
      # ─────────────────────────────────────────────
      - name: Clone AOSP Clang 11 (r383902b1)
        run: |
          git clone --depth=1 \
            https://github.com/anrui2032/android_prebuilts_clang_host_linux-x86_clang-r383902b1.git \
            $GITHUB_WORKSPACE/toolchain/clang-r383902b1
          rm -rf $GITHUB_WORKSPACE/toolchain/clang-r383902b1/.git

      - name: Verify Clang toolchain
        run: |
          CLANG_BIN="$GITHUB_WORKSPACE/toolchain/clang-r383902b1/bin/clang"
          [ -f "$CLANG_BIN" ] || { echo "ERROR: clang not found!"; exit 1; }
          "$CLANG_BIN" --version

      - name: Clone GCC cross-compilers
        run: |
          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          rm -rf $GITHUB_WORKSPACE/toolchain/gcc-aarch64/.git

          git clone --depth=1 -b lineage-19.1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc-arm32
          rm -rf $GITHUB_WORKSPACE/toolchain/gcc-arm32/.git

      # ─────────────────────────────────────────────
      # 4. STUB TECHPACK SUBDIRECTORIES
      # ─────────────────────────────────────────────
      - name: Create techpack stub Makefiles
        run: |
          TP="$GITHUB_WORKSPACE/kernel_source/techpack"
          for subdir in audio camera display dataipa video; do
            if [ ! -f "$TP/$subdir/Makefile" ]; then
              mkdir -p "$TP/$subdir"
              printf '# SPDX-License-Identifier: GPL-2.0-only\n# Stub: %s not available in standalone CI build\n' \
                "techpack/$subdir" > "$TP/$subdir/Makefile"
            fi
          done
          echo "==> techpack:"; ls -la "$TP/"

      # ─────────────────────────────────────────────
      # 5. RESOLVE OPLUS VENDOR SYMLINKS
      # ─────────────────────────────────────────────
      - name: Resolve cross-tree symlinks
        run: |
          KERNEL_SRC="$GITHUB_WORKSPACE/kernel_source"
          DT_SRC="$GITHUB_WORKSPACE/kernel_modules_devicetree"

          if [ -d "$DT_SRC/vendor" ]; then
            ln -sfn "$DT_SRC/vendor" "$GITHUB_WORKSPACE/vendor"
            ln -sfn "$DT_SRC/vendor" "$KERNEL_SRC/vendor" 2>/dev/null || true
            WORKSPACE_PARENT=$(dirname "$GITHUB_WORKSPACE")
            ln -sfn "$DT_SRC/vendor" "$WORKSPACE_PARENT/vendor" 2>/dev/null || true
          fi

          mkdir -p "$GITHUB_WORKSPACE/kernel"
          ln -sfn "$KERNEL_SRC" "$GITHUB_WORKSPACE/kernel/msm-5.4"
          mkdir -p "$DT_SRC/kernel"
          ln -sfn "$KERNEL_SRC" "$DT_SRC/kernel/msm-5.4"

          find "$KERNEL_SRC" -maxdepth 3 -type l ! -exec test -e {} \; -print 2>/dev/null \
            | xargs rm -f 2>/dev/null || true

      # ─────────────────────────────────────────────
      # 6. PREPARE DEFCONFIG
      # ─────────────────────────────────────────────
      - name: Place stock defconfig
        run: |
          cp $GITHUB_WORKSPACE/defconfig/${{ env.DEFCONFIG }} \
             $GITHUB_WORKSPACE/kernel_source/arch/arm64/configs/${{ env.DEFCONFIG }}

      # ─────────────────────────────────────────────
      # 7. BUILD KERNEL
      # ─────────────────────────────────────────────
      - name: Set up environment & build
        run: |
          CLANG_DIR="$GITHUB_WORKSPACE/toolchain/clang-r383902b1"
          GCC64_DIR="$GITHUB_WORKSPACE/toolchain/gcc-aarch64"
          GCC32_DIR="$GITHUB_WORKSPACE/toolchain/gcc-arm32"

          export PATH="$CLANG_DIR/bin:$GCC64_DIR/bin:$GCC32_DIR/bin:$PATH"
          mkdir -p $GITHUB_WORKSPACE/build_tmp
          export TMPDIR=$GITHUB_WORKSPACE/build_tmp

          MAKE_ARGS=(
            ARCH=arm64
            SUBARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_COMPAT=arm-linux-androideabi-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            LLVM=1
            LLVM_IAS=1
            O=out
          )

          cd $GITHUB_WORKSPACE/kernel_source

          make "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG }}

          echo "==> Applying CI-safe config overrides..."

          # --- LTO: disable to avoid OOM on 7GB runner ---
          scripts/config --file out/.config --disable LTO_CLANG
          scripts/config --file out/.config --disable LTO_CLANG_THIN
          scripts/config --file out/.config --disable LTO_CLANG_FULL
          scripts/config --file out/.config --enable  LTO_NONE

          # --- Sanitizers: disable to reduce memory pressure ---
          scripts/config --file out/.config --disable KASAN
          scripts/config --file out/.config --disable UBSAN

          # --- Section mismatches in OPlus vendor code are harmless warnings ---
          scripts/config --file out/.config --enable SECTION_MISMATCH_WARN_ONLY

          # ───────────────────────────────────────────────────────────────────
          # Force-enable QTI platform drivers to =y.
          # These are tristate drivers that get silently demoted to =m when
          # LTO_CLANG is replaced by LTO_NONE via olddefconfig dependency
          # resolution.  They MUST be =y (not =m) because built-in code in
          # vmlinux calls their exported symbols — if they're modules, the
          # linker sees undefined references at vmlinux link time.
          # ───────────────────────────────────────────────────────────────────

          # cmd_db_read_addr / cmd_db_read_aux_data
          scripts/config --file out/.config --enable QCOM_COMMAND_DB

          # rpmh_write / rpmh_write_async  (rpmh.c lives in drivers/soc/qcom)
          # The config name may vary; try common variants
          scripts/config --file out/.config --enable QCOM_RPMH       2>/dev/null || true
          scripts/config --file out/.config --enable QCOM_RPMH_MBOX  2>/dev/null || true

          # socinfo_get_id_string / socinfo_get_serial_number
          scripts/config --file out/.config --enable QCOM_SOCINFO

          # msm_minidump_enabled / msm_minidump_add_region
          scripts/config --file out/.config --enable MSM_MINIDUMP

          # qpnp_pbs_trigger_event
          scripts/config --file out/.config --enable QPNP_PBS         2>/dev/null || true

          # subsys_register_early_notifier / subsys_notif_unregister_notifier
          scripts/config --file out/.config --enable MSM_PIL           2>/dev/null || true
          scripts/config --file out/.config --enable MSM_SUBSYSTEM_RESTART 2>/dev/null || true

          # qcom_smem_state_get / qcom_smem_state_update_bits
          scripts/config --file out/.config --enable QCOM_SMEM_STATE   2>/dev/null || true
          scripts/config --file out/.config --enable QCOM_SMEM         2>/dev/null || true

          # service_notif_pd_restart / service_notif_unregister_notifier
          scripts/config --file out/.config --enable QTI_SERVICE_NOTIFIER   2>/dev/null || true
          scripts/config --file out/.config --enable MSM_QTI_SERVICE_NOTIFIER 2>/dev/null || true

          # destroy_ramdump_device
          scripts/config --file out/.config --enable MSM_RAMDUMP       2>/dev/null || true

          # rq_info / rq_wq  (CONFIG_QCOM_RUN_QUEUE_STATS)
          scripts/config --file out/.config --enable QCOM_RUN_QUEUE_STATS 2>/dev/null || true

          # sysctl_hh_suspend_timeout_ms (some suspend sysctl config)
          scripts/config --file out/.config --enable QTI_HH             2>/dev/null || true

          # __tracepoint_pil_restart_level (PIL restart tracepoint)
          scripts/config --file out/.config --enable MSM_QDSP6_PIL      2>/dev/null || true

          make "${MAKE_ARGS[@]}" olddefconfig

          echo "==> Memory before compilation:"; free -h
          make "${MAKE_ARGS[@]}" -j2 ${{ env.KERNEL_IMAGE }}
          echo "==> Build complete!"
          ls -la out/arch/arm64/boot/${{ env.KERNEL_IMAGE }}

      # ─────────────────────────────────────────────
      # 8. ANYKERNEL3 PACKAGING
      # ─────────────────────────────────────────────
      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3

      - name: Package kernel into flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm -rf modules patch ramdisk README.md
          cp $GITHUB_WORKSPACE/anykernel/anykernel.sh ./anykernel.sh
          cp $GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/${{ env.KERNEL_IMAGE }} ./${{ env.KERNEL_IMAGE }}
          DATESTAMP=$(date +%Y%m%d-%H%M)
          ZIP_NAME="StockEquiv-OP9Pro-${DATESTAMP}.zip"
          zip -r9 "$GITHUB_WORKSPACE/${ZIP_NAME}" . -x '.git/*' -x '*.zip'
          ls -lh "$GITHUB_WORKSPACE/${ZIP_NAME}"

      # ─────────────────────────────────────────────
      # 9. UPLOAD ARTIFACT
      # ─────────────────────────────────────────────
      - name: Upload kernel ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockEquiv-OP9Pro-kernel
          path: StockEquiv-OP9Pro-*.zip
          retention-days: 30
          if-no-files-found: error
