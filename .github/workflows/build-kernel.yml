name: Build OnePlus 9 Pro Kernel (Android 14 GKI)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium
          sudo apt-get clean

      - name: Install build dependencies & Repo tool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig python3 python-is-python3 bc ccache cpio dos2unix rsync kmod dwarves
          
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize & Sync Workspace (Toraidl Manifest)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p $GITHUB_WORKSPACE/android-kernel
          cd $GITHUB_WORKSPACE/android-kernel
          repo init -u https://github.com/toraidl/android_kernel_manifest -b oneplus/sm8350v_15.0.0_oneplus9pro --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Verify Toolchain Version
        run: |
          cd $GITHUB_WORKSPACE/android-kernel
          if [ ! -d "prebuilts/clang/host/linux-x86/clang-r487747c" ]; then
            echo "ERROR: Required Clang r487747c missing! Workspace sync failed or manifest is incorrect."
            exit 1
          fi
          prebuilts/clang/host/linux-x86/clang-r487747c/bin/clang --version

      - name: Build Kernel (build.sh)
        run: |
          cd $GITHUB_WORKSPACE/android-kernel
          
          # Setup required AOSP GKI Build variables for Android 14 SM8350
          export BUILD_CONFIG=kernel/msm-5.4/build.config.msm.lahaina
          export OUT_DIR=out
          export LTO=full
          export LLVM=1
          export LLVM_IAS=1
          
          # Remove pesky -Werror flags that might break compilation on custom configs
          find kernel/msm-5.4/ -type f \( -name "Makefile*" -o -name "Kbuild*" \) -exec sed -i 's/-Werror//g' {} + || true

          # Execute the official build script
          ./build/build.sh

      - name: Package Kernel via AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p FinalOutput
          
          RAW_IMAGE=$(find $GITHUB_WORKSPACE/android-kernel/out -type f -name "Image" | head -n 1)
          if [ -z "$RAW_IMAGE" ]; then
            echo "ERROR: Kernel image not found in out directory!"
            exit 1
          fi

          echo "==> Fetching AnyKernel3 template..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3

          echo "==> Preparing anykernel.sh for OnePlus 9 Pro (lemonadep)..."
          cat << 'EOF' > anykernel.sh
          # AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=Android 14 GKI OnePlus Kernel
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=OnePlus9Pro
          device.name2=lemonadep
          device.name3=OnePlus9
          device.name4=lemonade
          supported.versions=11.0-14.0
          supported.patchlevels=
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          dump_boot;
          patch_cmdline "androidboot.selinux" "androidboot.selinux=permissive"
          patch_fstab fstab.qcom /vendor ext4 options "avb=vbmeta_vendor" ""
          patch_fstab fstab.qcom /vendor ext4 options "avb_keys=.*" ""
          write_boot;
          EOF

          echo "==> Injecting Kernel Image..."
          cp "$RAW_IMAGE" ./Image
          
          # Copy DTB file if exist
          DTB=$(find $GITHUB_WORKSPACE/android-kernel/out -type f -name "dtb" | head -n 1)
          if [ -n "$DTB" ]; then cp "$DTB" ./dtb; fi

          echo "==> Zipping Output..."
          rm -rf .git README.md *placeholder
          zip -r9 "$GITHUB_WORKSPACE/FinalOutput/OP9Pro-Android14-Kernel.zip" .

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus9Pro-A14-Kernel-Package
          path: FinalOutput/*