name: Build OnePlus 9 Pro Kernel & Modules

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  # Flag configuration to fix VLA and DTS errors
  KCFLAGS: "-Wno-vla-extension -Wno-vla -Wno-error"
  DTC_FLAGS: "-Wno-graph_port"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel/msm-5.4
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex git gnupg gperf \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev \
            libssl-dev lzop python3 python-is-python3 cpio dos2unix rsync zip unzip kmod dwarves

      - name: Clone Toolchains
        run: |
          echo "==> Fetching Official AOSP Clang 14 (r450784d)..."
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          
          if ! wget -qO clang.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz"; then
            echo "==> AOSP Gitiles failed, falling back to reliable GitHub mirror..."
            git clone --depth=1 https://github.com/droidian/android-platform-prebuilts-clang-host-linux-x86-33.git /tmp/clang-mirror
            mv /tmp/clang-mirror/clang-r450784d/* $GITHUB_WORKSPACE/toolchain/clang/
            rm -rf /tmp/clang-mirror
          else
            tar -xf clang.tar.gz -C $GITHUB_WORKSPACE/toolchain/clang
            rm -f clang.tar.gz
          fi
          
          echo "==> Cloning GCC & Build Tools..."
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-arm32
          git clone https://android.googlesource.com/kernel/build --depth=1 $GITHUB_WORKSPACE/build
          
      - name: Construct Native AOSP Workspace Structure
        run: |
          mkdir -p $GITHUB_WORKSPACE/device $GITHUB_WORKSPACE/vendor
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/device/ $GITHUB_WORKSPACE/device/
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/vendor/ $GITHUB_WORKSPACE/vendor/

          mkdir -p $GITHUB_WORKSPACE/kernel/msm-5.4/techpack/
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/kernel/msm-5.4/techpack/ $GITHUB_WORKSPACE/kernel/msm-5.4/techpack/

          rm -rf $GITHUB_WORKSPACE/kernel_modules_devicetree
          ln -sfn $GITHUB_WORKSPACE/device/qcom/kernelscripts/upstream/build.config.common $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.common

      - name: Allocate Swap Space
        run: |
          sudo fallocate -l 10G /swapfile2 || sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2

      - name: Generate Proxy Config & Build Kernel with Modules
        run: |
          cd $GITHUB_WORKSPACE
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin:$GITHUB_WORKSPACE/toolchain/gcc-arm32/bin:$PATH"

          # Use consolidate variant instead of debug
          sed -i 's/VARIANTS=(qgki-debug/VARIANTS=(qgki-consolidate/' $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.msm.lahaina
          sed -i 's/qgki-debug | qgki-consolidate/qgki-consolidate | qgki-consolidate/' $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.msm.lahaina

          # Synchronize LOCALVERSION across ALL configs
          CONFIGS_DIR="$GITHUB_WORKSPACE/kernel/msm-5.4/arch/arm64/configs"
          find "$CONFIGS_DIR" -type f \( -name "*.config" -o -name "*defconfig" \) -exec sed -i 's/CONFIG_LOCALVERSION="[^"]*"/CONFIG_LOCALVERSION="-qgki-gd2a1055adeb0"/g' {} +
          
          cat << 'EOF' > build.config.custom
          function append_cmd() {
              if [ ! -z "${!1}" ]; then
                  eval "$1=\"${!1} && \$2\""
              else
                  eval "$1=\"\$2\""
              fi
          }
          export -f append_cmd
          . ${ROOT_DIR}/kernel/msm-5.4/build.config.msm.lahaina
          
          function fix_localversion() {
              # Force strictly matching LOCALVERSION to prevent bootloop
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --set-str LOCALVERSION "-qgki-gd2a1055adeb0"
              
              # Disable features causing build or boot issues
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --disable CFS_BANDWIDTH
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --disable DRM_MSM_IRIS
              
              # Critical: Disable symbol versioning to ensure module compatibility
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --disable MODVERSIONS
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --disable MODULE_SIG
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config --disable MODULE_SIG_ALL
              
              (cd ${KERNEL_DIR} && make "${TOOL_ARGS[@]}" O=${OUT_DIR} ${MAKE_ARGS} olddefconfig)
          }
          append_cmd POST_DEFCONFIG_CMDS 'fix_localversion'
          EOF

          mkdir -p $GITHUB_WORKSPACE/device/qcom/build
          cp $GITHUB_WORKSPACE/device/qcom/kernelscripts/_setup_env.sh $GITHUB_WORKSPACE/device/qcom/build/_setup_env.sh || true

          export BUILD_CONFIG=build.config.custom
          export KERNEL_DIR=kernel/msm-5.4
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Extra cleaning and scmversion fix
          find $GITHUB_WORKSPACE/kernel/msm-5.4/ -name ".git" -exec rm -rf {} +
          echo "" > $GITHUB_WORKSPACE/kernel/msm-5.4/.scmversion
          sed -i 's/echo "+"/echo ""/g' $GITHUB_WORKSPACE/kernel/msm-5.4/scripts/setlocalversion

          # Robust removal of -Werror including techpack and sub-makefiles
          find $GITHUB_WORKSPACE/kernel/msm-5.4/ -type f \( -name "Makefile*" -o -name "Kbuild*" -o -name "*.mk" \) -exec sed -i 's/-Werror[a-zA-Z0-9_=-]*//g' {} +
          
          # Run the build script with DTS flag suppression
          bash device/qcom/kernelscripts/build.sh LLVM=1 LLVM_IAS=1 DTC_FLAGS="${DTC_FLAGS}"
          
      - name: Prepare FinalOutput Directory
        run: mkdir -p $GITHUB_WORKSPACE/FinalOutput

      - name: Build Module for Out-of-Tree Definitions
        run: |
          mkdir -p $GITHUB_WORKSPACE/MagiskModule/custom_ko
          find $GITHUB_WORKSPACE/out -name "*.ko" -type f -exec cp {} $GITHUB_WORKSPACE/MagiskModule/custom_ko/ \;
          
          cat << 'EOF' > $GITHUB_WORKSPACE/MagiskModule/module.prop
          id=op9pro_custom_kernel_modules
          name=OnePlus 9 Pro Custom Kernel Modules
          version=v1.0
          versionCode=1
          author=CustomBuild
          description=Systemlessly injects out-of-tree modules for the custom kernel.
          EOF
          
          cat << 'EOF' > $GITHUB_WORKSPACE/MagiskModule/customize.sh
          ui_print "- Installing Custom Kernel Modules..."
          MODULES_DIR="/vendor/lib/modules"
          if [ ! -d "$MODULES_DIR" ]; then
              MODULES_DIR="/vendor_dlkm/lib/modules"
          fi
          ui_print "- Target directory: $MODULES_DIR"
          
          for ko in $(find $MODPATH/custom_ko -type f -name "*.ko"); do
              filename=$(basename $ko)
              sys_path=$(find $MODULES_DIR -type f -name "$filename" | head -n 1)
              if [ -n "$sys_path" ]; then
                  rel_path=${sys_path#$MODULES_DIR/}
                  mkdir -p $(dirname $MODPATH/system$MODULES_DIR/$rel_path)
                  cp $ko $MODPATH/system$MODULES_DIR/$rel_path
                  ui_print "  Overlaid: $filename"
              else
                  cp $ko $MODPATH/system$MODULES_DIR/
              fi
          done
          rm -rf $MODPATH/custom_ko
          EOF
          
          cd $GITHUB_WORKSPACE/MagiskModule
          zip -r9 $GITHUB_WORKSPACE/FinalOutput/OP9Pro-Kernel-Modules.zip .

      - name: Package Kernel into AnyKernel3 ZIP
        run: |
          RAW_IMAGE=$(find $GITHUB_WORKSPACE/out -type f -name "Image" | head -n 1)
          if [ -z "$RAW_IMAGE" ]; then
            echo "ERROR: Kernel image not found!"
            exit 1
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm -rf modules patch ramdisk README.md
          cp $GITHUB_WORKSPACE/anykernel/anykernel.sh ./anykernel.sh || true
          cp "$RAW_IMAGE" ./Image
          zip -r9 "$GITHUB_WORKSPACE/FinalOutput/OP9Pro-Custom-Kernel-AK3.zip" . -x '.git/*' -x '*.zip'

      - name: Patch Stock vendor_boot.img with New Modules
        run: |
          echo "==> Preparing vendor_boot patcher..."
          mkdir -p $GITHUB_WORKSPACE/vendor_boot_patch
          cd $GITHUB_WORKSPACE/vendor_boot_patch
          
          # We expect stock_vendor_boot.zip to be present in workspace (uploaded or checked in)
          if [ ! -f "$GITHUB_WORKSPACE/stock_vendor_boot.zip" ]; then
             echo "WARNING: stock_vendor_boot.zip not found. Skipping patch."
             exit 0
          fi

          unzip $GITHUB_WORKSPACE/stock_vendor_boot.zip
          STOCK_IMG=$(find . -name "*.img" | head -n 1)
          if [ -z "$STOCK_IMG" ]; then
            echo "ERROR: No .img found in stock_vendor_boot.zip!"
            exit 1
          fi
          
          if [ "$STOCK_IMG" != "./vendor_boot.img" ] && [ "$STOCK_IMG" != "vendor_boot.img" ]; then
            mv "$STOCK_IMG" vendor_boot.img
          fi
          
          echo "==> Fetching official magiskboot from Magisk APK..."
          wget -qO magisk.apk https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          
          echo "==> Unpacking vendor_boot.img..."
          ./magiskboot unpack vendor_boot.img
          
          if [ ! -f "ramdisk.cpio" ]; then
            echo "ERROR: magiskboot failed to extract ramdisk.cpio!"
            exit 1
          fi
          
          mkdir ramdisk_ext
          cd ramdisk_ext
          cpio -i < ../ramdisk.cpio
          
          echo "==> Replacing stock .ko modules with newly built ones..."
          for ko in $(find $GITHUB_WORKSPACE/out -name "*.ko" -type f); do
              filename=$(basename $ko)
              target=$(find . -type f -name "$filename" | head -n 1)
              if [ -n "$target" ]; then
                  cp $ko $target
                  echo "  [Updated] $filename -> $target"
              fi
          done
          
          find . | cpio -H newc -o > ../ramdisk.cpio
          cd ..
          
          echo "==> Repacking vendor_boot_custom.img..."
          ./magiskboot repack vendor_boot.img vendor_boot_custom.img
          cp vendor_boot_custom.img $GITHUB_WORKSPACE/FinalOutput/

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus-9Pro-Complete-Package
          path: FinalOutput/*
