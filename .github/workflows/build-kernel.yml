name: Build OnePlus 9 Pro Kernel (1:1 Stock)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  # Suppress Clang warnings that are not errors — safe for stock 1:1 build
  KCFLAGS: "-Wno-vla-extension -Wno-vla -Wno-error -Wno-ignored-optimization-argument -Wno-unknown-warning-option"
  DTC_FLAGS: "-Wno-graph_port"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel/msm-5.4
          fetch-depth: 1

      - name: Checkout device tree & modules
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVICE_TREE_REPO }}
          ref: ${{ env.DEVICE_TREE_BRANCH }}
          path: kernel_modules_devicetree
          fetch-depth: 1

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex git gnupg gperf \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev \
            libssl-dev lzop python3 python-is-python3 cpio dos2unix rsync zip unzip kmod dwarves

      - name: Clone Toolchains
        run: |
          # ================================================================
          # CRITICAL: Use clang-r416183b to match stock OnePlus kernel
          # Official source: build.config.common specifies this exact version
          # Using a different clang produces different CRCs → MODVERSIONS
          # mismatch → bootloop
          # ================================================================
          echo "==> Fetching AOSP Clang (r416183b) — matches official OnePlus build..."
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang

          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android12-release --depth=1 /tmp/clang-full

          CLANG_DIR=$(find /tmp/clang-full -maxdepth 1 -type d -name "clang-r416183b*" | head -n 1)
          if [ -z "$CLANG_DIR" ]; then
            echo "WARNING: clang-r416183b not found! Available:"
            ls -d /tmp/clang-full/clang-*/ 2>/dev/null || echo "No clang dirs found"
            CLANG_DIR=$(ls -d /tmp/clang-full/clang-*/ 2>/dev/null | sort -V | tail -n1)
          fi

          if [ -z "$CLANG_DIR" ]; then
            echo "ERROR: No AOSP Clang found!"
            exit 1
          fi

          echo "==> Using clang from: $CLANG_DIR"
          cp -r "$CLANG_DIR"/* $GITHUB_WORKSPACE/toolchain/clang/
          rm -rf /tmp/clang-full

          echo "==> Clang version:"
          $GITHUB_WORKSPACE/toolchain/clang/bin/clang --version

          echo "==> Cloning GCC & Build Tools..."
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git $GITHUB_WORKSPACE/toolchain/gcc-arm32
          git clone https://android.googlesource.com/kernel/build --depth=1 $GITHUB_WORKSPACE/build

      - name: Construct Native AOSP Workspace Structure
        run: |
          mkdir -p $GITHUB_WORKSPACE/device $GITHUB_WORKSPACE/vendor
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/device/ $GITHUB_WORKSPACE/device/
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/vendor/ $GITHUB_WORKSPACE/vendor/

          mkdir -p $GITHUB_WORKSPACE/kernel/msm-5.4/techpack/
          rsync -a $GITHUB_WORKSPACE/kernel_modules_devicetree/kernel/msm-5.4/techpack/ $GITHUB_WORKSPACE/kernel/msm-5.4/techpack/

          rm -rf $GITHUB_WORKSPACE/kernel_modules_devicetree

          ln -sfn $GITHUB_WORKSPACE/device/qcom/kernelscripts/upstream/build.config.common $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.common

      - name: Allocate Swap Space
        run: |
          sudo fallocate -l 10G /swapfile2 || sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin:$GITHUB_WORKSPACE/toolchain/gcc-arm32/bin:$PATH"

          # Use consolidate variant (matches stock)
          sed -i 's/VARIANTS=(qgki-debug/VARIANTS=(qgki-consolidate/' $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.msm.lahaina
          sed -i 's/qgki-debug | qgki-consolidate/qgki-consolidate | qgki-consolidate/' $GITHUB_WORKSPACE/kernel/msm-5.4/build.config.msm.lahaina

          # ================================================================
          # BUILD CONFIG — BOOTLOOP FIX (Build 110)
          #
          # Problem: AnyKernel3 flashes only the kernel Image. The 49
          # kernel modules in vendor_boot remain from stock. With
          # MODVERSIONS=y, CRC mismatches cause ALL modules to fail
          # loading → device hangs at OnePlus logo.
          #
          # Fix: Disable MODVERSIONS (removes CRC check) and enable
          # MODULE_FORCE_LOAD (allows loading despite vermagic diff).
          # This is the standard approach for ALL custom Android kernels.
          # ================================================================
          cat << 'EOF' > build.config.custom
          function append_cmd() {
              if [ ! -z "${!1}" ]; then
                  eval "$1=\"${!1} && \$2\""
              else
                  eval "$1=\"\$2\""
              fi
          }
          export -f append_cmd
          . ${ROOT_DIR}/kernel/msm-5.4/build.config.msm.lahaina

          function post_defconfig_checks() {
              echo "=== POST-DEFCONFIG CONFIG CHECK ==="
              echo "--- LOCALVERSION ---"
              grep "CONFIG_LOCALVERSION=" ${OUT_DIR}/.config || echo "(not found)"
              echo "--- Module versioning (BEFORE fix) ---"
              grep -E "CONFIG_MODVERSIONS=|CONFIG_MODULE_SIG=|CONFIG_MODULE_FORCE_LOAD=" ${OUT_DIR}/.config || echo "(not found)"
              echo "--- Display/GPU ---"
              grep -E "CONFIG_DRM=|CONFIG_DRM_MSM=" ${OUT_DIR}/.config || echo "(not found)"
              echo "--- Subsystem loaders ---"
              grep -E "CONFIG_QCOM_Q6V5|CONFIG_QCOM_RPMH=|CONFIG_QCOM_SMEM=" ${OUT_DIR}/.config || echo "(not found)"
              echo "=== END CONFIG CHECK ==="

              (cd ${KERNEL_DIR} && make "${TOOL_ARGS[@]}" O=${OUT_DIR} ${MAKE_ARGS} olddefconfig)
          }
          append_cmd POST_DEFCONFIG_CMDS 'post_defconfig_checks'

          function disable_modversions() {
              echo "============================================"
              echo "=== BOOTLOOP FIX: DISABLING MODVERSIONS ==="
              echo "============================================"
              echo ""
              echo "Reason: AnyKernel3 only flashes kernel Image."
              echo "49 modules in vendor_boot are from stock kernel."
              echo "MODVERSIONS CRC mismatch causes module load failure."
              echo ""

              # Disable MODVERSIONS — removes CRC verification
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config \
                  -d MODVERSIONS

              # Enable MODULE_FORCE_LOAD — allows loading modules
              # even if vermagic string doesn't match exactly
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config \
                  -e MODULE_FORCE_LOAD

              # Regenerate config to resolve dependencies
              (cd ${KERNEL_DIR} && make "${TOOL_ARGS[@]}" O=${OUT_DIR} ${MAKE_ARGS} olddefconfig)

              echo ""
              echo "--- Module config (AFTER fix) ---"
              grep -E "CONFIG_MODVERSIONS|CONFIG_MODULE_FORCE_LOAD" ${OUT_DIR}/.config
              echo "============================================"
          }
          append_cmd POST_DEFCONFIG_CMDS 'disable_modversions'
          EOF

          mkdir -p $GITHUB_WORKSPACE/device/qcom/build
          cp $GITHUB_WORKSPACE/device/qcom/kernelscripts/_setup_env.sh $GITHUB_WORKSPACE/device/qcom/build/_setup_env.sh || true

          export BUILD_CONFIG=build.config.custom
          export KERNEL_DIR=kernel/msm-5.4
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Fix scmversion to prevent unwanted suffix (e.g. -dirty, +)
          find $GITHUB_WORKSPACE/kernel/msm-5.4/ -name ".git" -exec rm -rf {} +
          echo "" > $GITHUB_WORKSPACE/kernel/msm-5.4/.scmversion
          sed -i 's/echo "+"/echo ""/g' $GITHUB_WORKSPACE/kernel/msm-5.4/scripts/setlocalversion

          # Remove -Werror to allow build to pass with warnings (stock has many)
          find $GITHUB_WORKSPACE/kernel/msm-5.4/ -type f \( -name "Makefile*" -o -name "Kbuild*" -o -name "*.mk" \) -exec sed -i 's/-Werror[a-zA-Z0-9_=-]*//g' {} +
          # Remove GCC-only flag unsupported by Clang
          find $GITHUB_WORKSPACE/kernel/msm-5.4/ -type f \( -name "Makefile*" -o -name "Kbuild*" -o -name "*.mk" \) -exec sed -i 's/-fmerge-constants//g' {} +

          # Run the build
          bash device/qcom/kernelscripts/build.sh LLVM=1 LLVM_IAS=1 DTC_FLAGS="${DTC_FLAGS}"

      - name: Package Kernel into AnyKernel3 ZIP
        run: |
          mkdir -p $GITHUB_WORKSPACE/FinalOutput

          RAW_IMAGE=$(find $GITHUB_WORKSPACE/out -type f -name "Image" | head -n 1)
          if [ -z "$RAW_IMAGE" ]; then
            echo "ERROR: Kernel image not found!"
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm -rf modules patch ramdisk README.md
          cp $GITHUB_WORKSPACE/anykernel/anykernel.sh ./anykernel.sh || true
          cp "$RAW_IMAGE" ./Image
          zip -r9 "$GITHUB_WORKSPACE/FinalOutput/OP9Pro-Stock-Kernel-AK3.zip" . -x '.git/*' -x '*.zip'

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OP9Pro-Stock-Kernel
          path: FinalOutput/*
